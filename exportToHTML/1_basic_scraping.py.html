<pre><a name="l1"><span class="ln">1    </span></a><span class="s0">import </span><span class="s1">requests</span>
<a name="l2"><span class="ln">2    </span></a><span class="s0">from </span><span class="s1">bs4 </span><span class="s0">import </span><span class="s1">BeautifulSoup</span>
<a name="l3"><span class="ln">3    </span></a>
<a name="l4"><span class="ln">4    </span></a><span class="s1">url </span><span class="s2">= </span><span class="s3">&quot;https://example.com&quot;</span>
<a name="l5"><span class="ln">5    </span></a>
<a name="l6"><span class="ln">6    </span></a><span class="s1">response </span><span class="s2">= </span><span class="s1">requests</span><span class="s2">.</span><span class="s1">get</span><span class="s2">(</span><span class="s1">url</span><span class="s2">)</span>
<a name="l7"><span class="ln">7    </span></a><span class="s1">soup </span><span class="s2">= </span><span class="s1">BeautifulSoup</span><span class="s2">(</span><span class="s1">response</span><span class="s2">.</span><span class="s1">text</span><span class="s2">, </span><span class="s3">&quot;html.parser&quot;</span><span class="s2">)</span>
<a name="l8"><span class="ln">8    </span></a>
<a name="l9"><span class="ln">9    </span></a><span class="s1">print</span><span class="s2">(</span><span class="s3">&quot;TITLE:&quot;</span><span class="s2">, </span><span class="s1">soup</span><span class="s2">.</span><span class="s1">title</span><span class="s2">.</span><span class="s1">text</span><span class="s2">)</span>
<a name="l10"><span class="ln">10   </span></a><span class="s1">print</span><span class="s2">(</span><span class="s3">&quot;PARAGRAPH:&quot;</span><span class="s2">, </span><span class="s1">soup</span><span class="s2">.</span><span class="s1">p</span><span class="s2">.</span><span class="s1">text</span><span class="s2">)</span></pre>
